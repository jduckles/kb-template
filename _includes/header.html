<header class="site-header{% if site.brand.header_dark %} site-header--dark{% endif %}">
  <div class="site-header__inner">
    <a class="site-header__logo" href="{{ '/' | relative_url }}">
      {% if site.brand.logo %}
        <img src="{{ site.brand.logo | relative_url }}" alt="{{ site.title }}" height="36">
      {% else %}
        <span class="site-header__logo-text">{{ site.title }}</span>
      {% endif %}
    </a>

    <nav class="site-nav" aria-label="Main navigation">
      {% for link in site.nav_links %}
        <a class="site-nav__link{% if page.url == link.url %} is-active{% endif %}"
           href="{{ link.url | relative_url }}">{{ link.title }}</a>
      {% endfor %}
    </nav>

    <button class="site-header__menu-toggle" aria-label="Toggle menu" aria-expanded="false">
      <i data-feather="menu"></i>
    </button>
  </div>
</header>
